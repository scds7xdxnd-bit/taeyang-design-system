<!-- @dsCard group="Components" viewport="700x880" name="Core primitives (print)" subtitle="Print-ready PDF version" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../styles.css">
<style>
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  @page { size: 700px 920px; margin: 0; }

  body { margin: 0; background: var(--bg-primary); font-family: var(--font-body); color: var(--text-primary); padding: 22px; box-sizing: border-box; width: 700px; }
  .grid { display: flex; flex-direction: column; gap: 22px; max-width: 660px; }
  .spec { display: flex; flex-direction: column; gap: 10px; }
  .spec__label { font-family: var(--font-pixel); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--grey-dark); }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }

  @media print {
    *, *::before, *::after {
      animation-delay: -99s !important;
      animation-duration: .001s !important;
      animation-iteration-count: 1 !important;
      animation-fill-mode: both !important;
      animation-play-state: running !important;
      transition-duration: 0s !important;
    }
  }
</style>
</head>
<body>
  <div id="root" class="grid"></div>
  <script src="../../_ds_bundle.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel">
    const NS = window.TaeyangHanDesignSystem_01d505;
    const { Button, Badge, Pill, Panel, ProgressBar, QuestRow } = NS;
    const Icon = NS.Icon || (({ name, size = 24, style }) => {
      const p = NS.ICON_PATHS[name];
      return p ? <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" aria-hidden="true" style={{ display: 'block', ...style }} dangerouslySetInnerHTML={{ __html: p }} /> : null;
    });
    const Ico = ({ n }) => <Icon name={n} size={18} />;

    function Showcase() {
      return (
        <>
          <div className="spec">
            <span className="spec__label">Button — variants</span>
            <div className="row">
              <Button variant="primary">Start Quest</Button>
              <Button variant="secondary">Copy Email</Button>
              <Button variant="coral" icon={<Ico n="external" />}>Email me</Button>
              <Button variant="ghost">Download CV</Button>
            </div>
            <div className="row">
              <Button variant="primary" size="small">Small</Button>
              <Button variant="secondary" size="small">Small</Button>
              <Button variant="primary" disabled>Disabled</Button>
            </div>
          </div>

          <div className="spec">
            <span className="spec__label">Badge</span>
            <div className="row">
              <Badge tone="star">Building</Badge>
              <Badge tone="mint">Live</Badge>
              <Badge tone="sky">Info</Badge>
              <Badge tone="coral">In Dev</Badge>
              <Badge tone="purple">Special</Badge>
              <Badge tone="ghost">★ Section</Badge>
            </div>
          </div>

          <div className="spec">
            <span className="spec__label">Pill — filters · status</span>
            <div className="row">
              <Pill interactive active>All</Pill>
              <Pill interactive>Engineer</Pill>
              <Pill interactive>Builder</Pill>
              <Pill tone="mint">Active</Pill>
              <Pill tone="sunshine">In progress</Pill>
              <Pill tone="coral">In development</Pill>
            </div>
          </div>

          <div className="spec">
            <span className="spec__label">ProgressBar</span>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              <ProgressBar value={90} color="sky" />
              <ProgressBar value={70} color="mint" />
              <ProgressBar value={45} color="coral" />
            </div>
          </div>

          <div className="spec">
            <span className="spec__label">Panel</span>
            <div className="two">
              <Panel title="Player Profile">
                <p style={{ margin: 0, fontSize: 13, color: 'var(--grey-dark)' }}>Default sunshine header on a white game-panel surface.</p>
              </Panel>
              <Panel title="Current Quests" variant="quests">
                <QuestRow icon={<Ico n="dashboard" />} title="LifeOS" desc="Personal operating system" proof="LIVE" />
                <QuestRow icon={<Ico n="flask" />} title="Reaction Sim" desc="CSTR/PFR network" proof="LIVE" />
              </Panel>
            </div>
          </div>

          <div className="spec">
            <span className="spec__label">QuestRow — with progress</span>
            <Panel>
              <QuestRow icon={<Ico n="globe" />} title="Linguist" desc="EN · KO · ZH · MS · ES" progress={90} progressColor="sky" />
              <QuestRow icon={<Ico n="users" />} title="Community" desc="150+ mentees" progress={92} progressColor="purple" />
            </Panel>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Showcase />);
  </script>

  <script>
    addEventListener('load', () => {
      (async () => {
        // Wait for Babel/React to render content into #root
        await new Promise(resolve => {
          const check = () => {
            const root = document.getElementById('root');
            if (root && root.children.length > 0) return resolve();
            setTimeout(check, 100);
          };
          check();
        });
        // Wait for fonts
        try { await document.fonts.ready; } catch (e) {}
        // Wait for images
        const imgs = Array.from(document.images).filter(i => !i.complete);
        await Promise.race([
          Promise.allSettled(imgs.map(i => i.decode())),
          new Promise(r => setTimeout(r, 8000)),
        ]);
        setTimeout(() => window.print(), 500);
      })();
    });
  </script>
</body>
</html>
