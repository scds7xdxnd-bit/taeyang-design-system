<!-- @dsCard group="Colors" viewport="700x190" name="Brand palette" subtitle="Sunshine, coral, sky, mint, purple — the sticker colors" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-primary); font-family:var(--font-body); padding:22px; }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .sw { display:flex; flex-direction:column; gap:8px; }
  .chip { width:118px; height:74px; border:var(--border-thick); border-radius:var(--radius-md); box-shadow:var(--shadow-offset-sm); }
  .name { font-family:var(--font-pixel); font-size:9px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink); }
  .hex { font-family:var(--font-body); font-size:11px; color:var(--grey-dark); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--sunshine)"></div><span class="name">Sunshine</span><span class="hex">#FFD859</span></div>
    <div class="sw"><div class="chip" style="background:var(--coral)"></div><span class="name">Coral</span><span class="hex">#FF6B6B</span></div>
    <div class="sw"><div class="chip" style="background:var(--sky)"></div><span class="name">Sky</span><span class="hex">#6EC6FF</span></div>
    <div class="sw"><div class="chip" style="background:var(--mint)"></div><span class="name">Mint</span><span class="hex">#7EE6A7</span></div>
    <div class="sw"><div class="chip" style="background:var(--purple)"></div><span class="name">Purple</span><span class="hex">#B084F5</span></div>
  </div>
</body></html>
