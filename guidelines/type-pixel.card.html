<!-- @dsCard group="Type" viewport="700x180" name="Pixel accent — Press Start 2P" subtitle="Tiny UPPERCASE labels & % only — never body" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-primary); padding:24px; color:var(--ink); }
  .tag { font-family:var(--font-pixel); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--grey-dark); }
  .row { display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin:14px 0; }
  .pix { font-family:var(--font-pixel); text-transform:uppercase; letter-spacing:.1em; font-weight:700; }
  .b { display:inline-flex; align-items:center; padding:4px 10px; border:var(--border-thin); border-radius:var(--radius-pill); background:var(--sunshine); font-size:10px; }
  .strip { display:flex; gap:8px; align-items:center; font-size:13px; }
  .strip span { padding:2px 10px; background:var(--sunshine); border:2px solid var(--ink); border-radius:var(--radius-pill); }
</style></head>
<body>
  <span class="tag">Pixel · badges · % · EXP — labels only</span>
  <div class="row">
    <span class="pix b">Building</span>
    <span class="pix" style="font-size:11px">85%</span>
    <span class="pix" style="font-size:10px;color:var(--grey-dark)">CURRENT QUESTS</span>
  </div>
  <div class="strip pix" style="font-size:12px">
    <span>BUILD</span>→<span>TEST</span>→<span>IMPROVE</span>→<span>REPEAT</span>
  </div>
</body></html>
