<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-primary); padding:24px; color:var(--ink); }
  .tag { font-family:var(--font-pixel); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--grey-dark); }
  .t1 { font-family:var(--font-game); font-weight:800; font-size:1.75rem; letter-spacing:-0.02em; line-height:1.2; margin:4px 0 14px; }
  .t2 { font-family:var(--font-game); font-weight:700; font-size:1.5rem; letter-spacing:-0.02em; margin:4px 0 14px; }
  .t3 { font-family:var(--font-game); font-weight:700; font-size:13px; }
</style></head>
<body>
  <span class="tag">Section title · 800 · clamp→1.75rem</span>
  <div class="t1">What I Build &amp; Why It Matters</div>
  <span class="tag">Headline · 700 · clamp→1.5rem</span>
  <div class="t2">Build systems. Level up life.</div>
  <span class="tag">Panel header · 700 · 13px</span>
  <div class="t3">Player Profile</div>
</body></html>
