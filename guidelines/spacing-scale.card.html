<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="8pt-ish — xs 4 → 3xl 64" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-primary); padding:24px; color:var(--ink); font-family:var(--font-body); }
  .row { display:flex; align-items:flex-end; gap:18px; flex-wrap:wrap; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar { background:var(--sunshine); border:2px solid var(--ink); border-radius:var(--radius-sm); width:22px; }
  .lab { font-family:var(--font-pixel); font-size:8px; letter-spacing:.06em; text-transform:uppercase; color:var(--grey-dark); }
  .val { font-size:11px; color:var(--ink); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><span class="lab">xs</span><span class="val">4</span></div>
    <div class="item"><div class="bar" style="height:8px"></div><span class="lab">sm</span><span class="val">8</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="lab">md</span><span class="val">16</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="lab">lg</span><span class="val">24</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="lab">xl</span><span class="val">32</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="lab">2xl</span><span class="val">48</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><span class="lab">3xl</span><span class="val">64</span></div>
  </div>
</body></html>
