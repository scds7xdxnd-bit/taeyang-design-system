<!-- @dsCard group="Spacing" viewport="700x180" name="Radii & borders" subtitle="4 / 8 / 12 / pill · ink borders 2–3px" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-primary); padding:24px; color:var(--ink); font-family:var(--font-body); }
  .row { display:flex; gap:18px; flex-wrap:wrap; align-items:flex-start; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width:78px; height:60px; background:var(--bg-panel); border:var(--border-thin); }
  .lab { font-family:var(--font-pixel); font-size:8px; letter-spacing:.06em; text-transform:uppercase; color:var(--grey-dark); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lab">sm · 4</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lab">md · 8</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lab">lg · 12</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill);width:96px"></div><span class="lab">pill · 999</span></div>
    <div class="item"><div class="box" style="border:var(--border-subtle);border-radius:var(--radius-md)"></div><span class="lab">subtle · grey 2</span></div>
    <div class="item"><div class="box" style="border:var(--border-thick);border-radius:var(--radius-md)"></div><span class="lab">thick · ink 3</span></div>
  </div>
</body></html>
