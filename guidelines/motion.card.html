<!-- @dsCard group="Spacing" viewport="700x200" name="Motion — hover to feel it" subtitle="Bounce for interactions, smooth for reveals" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-primary); padding:28px; color:var(--ink); font-family:var(--font-body); }
  .tag { font-family:var(--font-pixel); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--grey-dark); }
  .row { display:flex; gap:18px; flex-wrap:wrap; margin-top:14px; }
  .btn { min-height:48px; padding:0 22px; display:inline-flex; align-items:center; font-family:var(--font-game); font-weight:700; font-size:14px; background:var(--ink); color:var(--text-on-dark); border:var(--border-thick); border-radius:var(--radius-md); box-shadow:var(--shadow-offset-sm); cursor:pointer;
        transition:transform var(--duration-fast) var(--ease-bounce), box-shadow var(--duration-fast) var(--ease-bounce); }
  .btn:hover { transform:var(--hover-lift); box-shadow:var(--shadow-offset); }
  .btn:active { transform:var(--active-press); box-shadow:var(--shadow-pressed); }
  .meta { font-size:12px; color:var(--grey-dark); margin-top:14px; line-height:1.7; }
  code { font-family:var(--font-pixel); font-size:9px; background:var(--bg-panel); border:1.5px solid var(--ink); border-radius:4px; padding:1px 5px; }
</style></head>
<body>
  <span class="tag">Hover / press me — bounce easing</span>
  <div class="row"><button class="btn">Start Quest</button></div>
  <p class="meta">
    <code>--ease-bounce</code> cubic-bezier(0.34, 1.56, 0.64, 1) — interactions &amp; presses<br>
    <code>--ease-smooth</code> cubic-bezier(0.2, 0.8, 0.2, 1) — reveals &amp; progress<br>
    fast 150ms · medium 250ms · slow 400ms
  </p>
</body></html>
