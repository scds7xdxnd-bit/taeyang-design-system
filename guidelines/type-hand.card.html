<!-- @dsCard group="Type" viewport="700x170" name="Handwriting — Caveat" subtitle="Speech bubbles & human annotations" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-primary); padding:24px; color:var(--ink); }
  .tag { font-family:var(--font-pixel); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--grey-dark); }
  .bubble { position:relative; display:inline-block; background:var(--bg-panel); border:var(--border-thick); border-radius:var(--radius-md); box-shadow:var(--shadow-offset-sm); padding:14px 18px; margin:14px 0; }
  .bubble p { font-family:var(--font-hand); font-size:22px; font-weight:600; line-height:1.4; margin:0; }
  .bubble::after { content:''; position:absolute; bottom:-10px; left:24px; width:16px; height:16px; background:var(--bg-panel); border-right:var(--border-thick); border-bottom:var(--border-thick); transform:rotate(45deg); }
  .anno { font-family:var(--font-hand); font-size:20px; color:var(--coral); }
</style></head>
<body>
  <span class="tag">Handwriting · Caveat · speech & notes</span>
  <div class="bubble"><p>I build fun, practical systems that help people learn and grow.</p></div>
  <div class="anno">every number here is backed by proof ↗</div>
</body></html>
