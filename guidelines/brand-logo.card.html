<!-- @dsCard group="Brand" viewport="700x200" name="Logo" subtitle="The 'T' mark — mint on ink, DM Sans" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; background:var(--bg-primary); padding:28px; color:var(--ink); font-family:var(--font-body); }
  .row { display:flex; gap:28px; align-items:center; flex-wrap:wrap; }
  .mark { width:72px; height:72px; border-radius:14px; }
  .mark.lg { width:104px; height:104px; }
  .lockup { display:flex; align-items:center; gap:14px; }
  .word { font-family:var(--font-game); font-weight:800; font-size:22px; letter-spacing:-0.02em; }
  .word span { color:var(--coral); }
  .tag { font-family:var(--font-pixel); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--grey-dark); margin-top:14px; display:block; }
</style></head>
<body>
  <div class="row">
    <img class="mark lg" src="../assets/logo/favicon.svg" alt="Taeyang Han logo">
    <img class="mark" src="../assets/logo/favicon.svg" alt="">
    <div class="lockup">
      <img class="mark" style="width:44px;height:44px;border-radius:9px" src="../assets/logo/favicon.svg" alt="">
      <span class="word">Taeyang <span>Han</span></span>
    </div>
  </div>
  <span class="tag">Rounded ink tile · mint "T" · pairs with the wordmark</span>
</body></html>
